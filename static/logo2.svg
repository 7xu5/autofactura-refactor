    <style type="text/css">
      /* Efecto pulso suave para la moneda de Euro */
      .anim-moneda {
        transform-origin: 20.22px 24.14px; /* Centro exacto del círculo del euro */
        animation: pulsoEuro 3s infinite ease-in-out;
      }
      
      /* Efecto respiración/brillo para el indicador verde */
      .anim-check {
        transform-origin: 21.11px 3.68px; /* Centro del círculo verde */
        animation: brilloCheck 2.5s infinite ease-in-out;
      }

      @keyframes pulsoEuro {
        0% { transform: scale(1); }
        50% { transform: scale(1.08); }
        100% { transform: scale(1); }
      }

      @keyframes brilloCheck {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(0.9); }
        100% { opacity: 1; transform: scale(1); }
      }
    </style>

